# Infra scaffold for a production-leaning Customs run (RFC-LIM-001 §8.1).
#
# The PoC sinks emit to stdout, so the demo needs none of this — it's here for
# wiring the sinks to real services and giving the hold store durable, Redis-
# backed persistence (the remaining W7 upgrade; the host's KvScope is the swap
# point). Bring it up with:  docker compose -f examples/customs/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: customs
      POSTGRES_PASSWORD: customs
      POSTGRES_DB: customs
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
    ports: ["9092:9092"]
