# Uniswap v3 swaps → USD enrichment → Postgres + Kafka fan-out.
#
#                          ┌──▶ sink-postgres
#   source ─▶ decoder ─▶ enricher
#                          └──▶ sink-kafka
#
# A single source cursor feeds two sinks — the multi-sink fan-out a Subgraph
# can't express. Run with:
#   cargo run -p liminal-host -- examples/uni-v3-swaps/pipeline.toml --limit 5

name = "uni-v3-swaps"

[source]
type = "evm"
rpc = "${ETH_RPC_URL}"
topics = [
    "0xc42079f94a6350d7e6235f29174924f928cc2ac818eb64fed8004e115fbcca67", # Uniswap v3 Swap
]

[[nodes]]
id = "decoder"
wasm = "examples/uni-v3-swaps/decoder.wasm"

[[nodes]]
id = "enricher"
wasm = "examples/uni-v3-swaps/price-enricher.wasm"
capabilities = ["http"]
env = { ORACLE_URL = "https://coins.llama.fi" }

[[nodes]]
id = "sink-postgres"
wasm = "examples/uni-v3-swaps/sink-postgres.wasm"
capabilities = ["stdout"]
env = { POSTGRES_CONFIG = "${DATABASE_URL:-postgres://localhost/liminal}" }

[[nodes]]
id = "sink-kafka"
wasm = "examples/uni-v3-swaps/sink-kafka.wasm"
capabilities = ["stdout"]
env = { KAFKA_CONFIG = "${KAFKA_BROKERS:-localhost:9092}" }

[[edges]]
from = "source"
to = "decoder"

[[edges]]
from = "decoder"
to = "enricher"

[[edges]]
from = "enricher"
to = "sink-postgres"

[[edges]]
from = "enricher"
to = "sink-kafka"
