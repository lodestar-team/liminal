# Customs (live) — same DAG as customs.pipeline.toml, but the screener calls a
# real screening provider over origin-scoped wasi:http and fails closed.
#
#   examples/customs/run.sh        # starts screening-server, then runs this
#
# Differences from the offline manifest:
#   - screener = screener-http.wasm, granted http + allow_origins + keyvalue
#   - if the provider is unreachable, every transfer → HOLD (fail-closed)

name = "customs-live"

[source]
type = "fixture"
path = "examples/customs/fixtures/transfers.jsonl"

[[nodes]]
id = "decoder"
wasm = "examples/customs/decoder.wasm"

[[nodes]]
id = "screener"
wasm = "examples/customs/screener-http.wasm"
capabilities = ["http"]
allow_origins = ["http://localhost:8088"] # W2: ONLY the screening origin
keyvalue = "verdicts"                       # W4: private verdict cache
env = { SCREENING_URL = "${SCREENING_URL:-http://localhost:8088}", SCREENING_LIST_VERSION = "ofac-sdn-2024-06-07" }

[[nodes]]
id = "enricher"
wasm = "examples/customs/enricher.wasm"

[[nodes]]
id = "sink-sor"
wasm = "examples/customs/sink-sor.wasm"
capabilities = ["stdout"]
env = { POSTGRES_CONFIG = "${DATABASE_URL:-postgres://localhost/customs}" }

[[nodes]]
id = "sink-kafka"
wasm = "examples/customs/sink-kafka.wasm"
capabilities = ["stdout"]
env = { KAFKA_CONFIG = "${KAFKA_BROKERS:-localhost:9092}" }

[[nodes]]
id = "sink-quarantine"
wasm = "examples/customs/sink-quarantine.wasm"
capabilities = ["stdout"]

[[nodes]]
id = "sink-hold"
wasm = "examples/customs/sink-hold.wasm"
capabilities = ["stdout"]

[[edges]]
from = "source"
to = "decoder"
[[edges]]
from = "decoder"
to = "screener"
[[edges]]
from = "screener"
to = "enricher"
when = "cleared"
[[edges]]
from = "screener"
to = "sink-quarantine"
when = "flagged"
[[edges]]
from = "screener"
to = "sink-hold"
when = "indeterminate"
[[edges]]
from = "enricher"
to = "sink-sor"
[[edges]]
from = "enricher"
to = "sink-kafka"
