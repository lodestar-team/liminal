# Cross-DEX arbitrage tracker.
#
#   source ──▶ decoder ──▶ enricher ──▶ sink ──▶ (dashboard SSE)
#
# Run with:  cargo run -p liminal-host -- examples/cross-dex-arb/pipeline.toml

name = "cross-dex-arb"

[source]
type = "evm"
rpc = "${ETH_RPC_URL}"
topics = [
    "0xc42079f94a6350d7e6235f29174924f928cc2ac818eb64fed8004e115fbcca67", # Uniswap v3 Swap
    "0x2170c741c41531aec20e7c107c24eecfdd15e69c9bb0a8dd37b1840b9e0b207b", # Balancer v2 Swap
]

[[nodes]]
id = "decoder"
wasm = "examples/cross-dex-arb/decoder.wasm"
# No capabilities: pure compute. It cannot touch the network even if it tried.

[[nodes]]
id = "enricher"
wasm = "examples/cross-dex-arb/enricher.wasm"
capabilities = ["http"] # the ONLY node granted network egress
allow_origins = ["https://coins.llama.fi"] # W2: and ONLY to this origin
env = { ORACLE_URL = "https://coins.llama.fi" }

[[nodes]]
id = "sink"
wasm = "examples/cross-dex-arb/sink-json.wasm"
capabilities = ["stdout"]

[[edges]]
from = "source"
to = "decoder"

[[edges]]
from = "decoder"
to = "enricher"

[[edges]]
from = "enricher"
to = "sink"

[dashboard]
port = 8080
html = "examples/cross-dex-arb/dashboard/index.html"
